# ────────────────────────────────────────────
# Lead Rush — Production profile
# Activated via SPRING_PROFILES_ACTIVE=prod on Render / Fly / OCI.
# ────────────────────────────────────────────
#
# Expected environment variables (all REQUIRED unless noted):
#
#   JDBC_DATABASE_URL    Neon's "Java JDBC" connection string, e.g.
#                        jdbc:postgresql://ep-xxx.us-east-2.aws.neon.tech/leadrush?sslmode=require
#   DATABASE_USERNAME    Neon database role (shown alongside the URL).
#   DATABASE_PASSWORD    Neon database password.
#   REDIS_URL            Full URL from Upstash / Redis Cloud / Aiven, e.g.
#                        rediss://default:<password>@host:6379
#                        Prefer rediss:// (TLS) when the provider offers it.
#   JWT_SECRET           Auto-generated by render.yaml (>= 32 chars).
#   ENCRYPTION_KEY       Auto-generated by render.yaml (mailbox credential encryption).
#   FRONTEND_URL         Public URL of the Nuxt service; used for absolute links.
#   SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD   (optional — required to send email)
#   GROQ_API_KEY         (optional — AI opener + email writer refuse without it)
#
# Anything marked as "optional" degrades gracefully: the app keeps running, the
# feature it powers just throws a user-friendly "not configured" error.

spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate          # Flyway owns the schema — JPA must not touch it.
  flyway:
    enabled: true
    baseline-on-migrate: true     # Needed if you ever attach to an existing DB.

  # Read the JDBC URL directly from the env. Neon and most other managed
  # Postgres providers give you this string ready-made — there's a "Java JDBC"
  # driver option in the Neon dashboard that outputs the right shape:
  #   jdbc:postgresql://ep-xxx.us-east-2.aws.neon.tech/leadrush?sslmode=require
  # The `sslmode=require` query param matters for Neon — TLS is mandatory.
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      # Neon free tier has strict concurrent-connection limits; keep the pool small.
      maximum-pool-size: 5
      minimum-idle: 1

logging:
  level:
    "[com.leadrush]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.springframework.security]": WARN

# Actuator — Render polls /actuator/health for healthcheckPath.
# Keep the exposure narrow to avoid leaking internals.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  # Turn off the Redis (and a couple of other cross-network) health indicators.
  # Why: Render polls /actuator/health every few seconds. If Upstash is slow to
  # respond (cold TLS handshake, queueing, regional hop), the aggregate health
  # check takes > 10 s, Render marks the service unhealthy, kills the pod, and
  # we rolling-restart mid-request. Redis is a cache — losing it doesn't break
  # the app (see CacheService's try/catch fallthrough). So don't gate LIVENESS
  # on Upstash's latency.
  health:
    redis:
      enabled: false
    mail:
      enabled: false
    ping:
      enabled: true
