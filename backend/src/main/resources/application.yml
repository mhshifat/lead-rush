# ──────────────────────────────────────────────
# Lead Rush — Shared Configuration
# All env-specific values use ${ENV_VAR} placeholders
# Profiles: dev (default), prod
# ──────────────────────────────────────────────

spring:
  application:
    name: lead-rush
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # ── Database ──
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/lead-rush}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Redis (30MB / 30 connections) ──
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2
          max-wait: 2000ms

  # ── Virtual Threads (Java 21) ──
  threads:
    virtual:
      enabled: true

  # ── Email (SMTP) ──
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # ── OAuth2 (Google + GitHub) ──
  # Uncomment when OAuth client credentials are provisioned.
  #security:
  #  oauth2:
  #    client:
  #      registration:
  #        google:
  #          client-id: ${GOOGLE_CLIENT_ID}
  #          client-secret: ${GOOGLE_CLIENT_SECRET}
  #          scope: email, profile
  #          redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/google"
  #        github:
  #          client-id: ${GITHUB_CLIENT_ID}
  #          client-secret: ${GITHUB_CLIENT_SECRET}
  #          scope: user:email, read:user
  #          redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/github"

# ── Custom App Config ──
leadrush:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-dev-only-change-in-production-min-32-chars}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}        # 15 minutes in ms
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}   # 7 days in ms
  frontend-url: ${FRONTEND_URL:http://localhost:3001}
  encryption-key: ${ENCRYPTION_KEY:dev-encryption-key-change-in-prod}
  email:
    from-address: ${EMAIL_FROM_ADDRESS:noreply@leadrush.local}
    from-name: ${EMAIL_FROM_NAME:Lead Rush}

# ── Swagger / OpenAPI ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ──
logging:
  level:
    com.leadrush: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

# ── Server ──
server:
  port: 8080
