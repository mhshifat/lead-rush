# ──────────────────────────────────────────────────────────────
# Lead Rush — Render Blueprint (Infrastructure as Code)
#
# Scope: Spring Boot backend only. Frontend is deployed separately on Vercel
# (Nuxt 3's Vercel preset gives edge rendering + zero-config CDN).
#
# Data stack (both external — set creds in Render dashboard):
#   • Postgres:  Neon     (https://neon.tech)
#   • Redis:     Upstash / Redis Cloud / Aiven / ...
#
# Every env var marked `sync: false` is filled in from the Render dashboard
# after the first Blueprint sync. Render won't deploy the backend until the
# required ones are set.
#
# Docs: https://render.com/docs/blueprint-spec
# ──────────────────────────────────────────────────────────────

services:
  # ── Backend: Spring Boot (Dockerfile) ──
  - type: web
    name: lead-rush-backend
    runtime: docker
    plan: free                    # 512 MB RAM, sleeps after 15 min idle; upgrade for prod
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # ── Database (Neon) ──
      # In Neon → Connection details → driver "Java JDBC". Copy full string:
      #   jdbc:postgresql://ep-xxx.us-east-2.aws.neon.tech/leadrush?sslmode=require
      - key: JDBC_DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false

      # ── Redis (Upstash / Redis Cloud / Aiven / …) ──
      # Full URL form, e.g. rediss://default:<password>@host:6379
      # Prefer rediss:// (TLS) when the provider offers it.
      - key: REDIS_URL
        sync: false

      # ── Frontend origin (Vercel) ──
      # Set to your Vercel production URL once the frontend is deployed, e.g.
      #   https://lead-rush.vercel.app
      # Accepts comma-separated values — add Vercel preview URLs with a pattern:
      #   https://lead-rush.vercel.app,https://*.vercel.app
      # Used by CORS (to allow the browser to call the backend) AND for
      # absolute-link construction in emails + panel deep-links.
      - key: FRONTEND_URL
        sync: false

      # ── Secrets auto-generated on first deploy. Rotate via the dashboard any time. ──
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

      # ── Email (SMTP) — optional until you enable outreach ──
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_FROM_NAME
        sync: false

      # ── OAuth (Google + GitHub) — optional, uncomment block in application.yml ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

      # ── Cloudinary (file storage) — optional ──
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Stripe — optional until billing is on ──
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── Groq (AI opener + email writer). Degrades cleanly if unset. ──
      - key: GROQ_API_KEY
        sync: false

      # ── Enrichment providers — all optional. Waterfall skips blank ones. ──
      - key: HUNTER_API_KEY
        sync: false
      - key: DROPCONTACT_API_KEY
        sync: false
      - key: CLEARBIT_API_KEY
        sync: false
      - key: PEOPLE_DATA_LABS_API_KEY
        sync: false

# ───────────────────────────────────────────
# Post-deploy checklist:
#
# 1. Neon Postgres (free tier)
#    • Create project → database "leadrush"
#    • Connection details → driver "Java JDBC" → copy string
#    • Render dashboard → lead-rush-backend → Environment:
#        JDBC_DATABASE_URL = jdbc:postgresql://ep-xxx.../leadrush?sslmode=require
#        DATABASE_USERNAME = <user>
#        DATABASE_PASSWORD = <password>
#
# 2. Redis (Upstash free tier)
#    • Create a database → copy the TLS endpoint URL
#    • Render dashboard → lead-rush-backend → Environment:
#        REDIS_URL = rediss://default:…@…:6379
#
# 3. Trigger the first backend deploy → watch logs for Flyway V1..V26 applied.
#
# 4. Vercel frontend
#    • Import the repo at vercel.com/new
#    • Root directory: frontend/
#    • Framework preset: Nuxt.js (auto-detected)
#    • Environment variables (Production + Preview):
#        NUXT_PUBLIC_API_BASE_URL = https://lead-rush-backend-xxxx.onrender.com/api/v1
#        NUXT_PUBLIC_SITE_URL     = https://<your-vercel-domain>
#    • Deploy
#
# 5. Wire FRONTEND_URL back to the backend
#    • Render dashboard → lead-rush-backend → Environment:
#        FRONTEND_URL = https://<your-vercel-domain>
#      (or a comma-separated list with a preview pattern:
#         https://<your-vercel-domain>,https://*.vercel.app )
#    • Manual Deploy → Deploy latest
#
# 6. Rebuild the browser extension with the live URLs:
#      cd extension
#      echo "WXT_BACKEND_URL=https://lead-rush-backend-xxxx.onrender.com"  > .env
#      echo "WXT_FRONTEND_URL=https://<your-vercel-domain>" >> .env
#      npx wxt build
# ───────────────────────────────────────────
